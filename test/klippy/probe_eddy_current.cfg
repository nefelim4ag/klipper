[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[probe_eddy_current ldc1612]
sensor_type: ldc1612
reg_drive_current: 15
x_offset: 0
y_offset: 2
z_offset: 1
i2c_address: 42
i2c_software_scl_pin: PB6
i2c_software_sda_pin: PB7
intb_pin: PB3
;speed: 3
;lift_speed: 7
;samples: 4
;sample_retract_dist: 3
;samples_result: average
;samples_tolerance: 0.015
;samples_tolerance_retries: 5
;tap_threshold: 1800
